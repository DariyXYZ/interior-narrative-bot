name: Publish Mini App branch

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build gh-pages branch from webapp
        run: git subtree split --prefix webapp -b pages-deploy
      - name: Push gh-pages branch
        run: git push origin pages-deploy:gh-pages --force
